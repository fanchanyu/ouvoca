name: ouvoca

# ═══════════════════════════════════════════════════════════════════════
# Dev compose — Port binding policy
# ───────────────────────────────────────────────────────────────────────
# 所有 host port 顯式綁 127.0.0.1（loopback only），不暴露到 LAN：
#   ① 安全：避免同辦公網路其他人 hit 到你的 dev 環境
#   ② 穩定：Windows Docker Desktop + WSL2 在 0.0.0.0 bind 偶有
#     port forwarding 不到 localhost 的問題（v3.25.7 教訓 #38）
# 若要對外（demo 給客戶），請改用 docker-compose.prod.yml
# ═══════════════════════════════════════════════════════════════════════

services:
  # ─── HQ backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ouvoca-backend
    ports:
      - "127.0.0.1:8000:8000"  # loopback only — 同辦公網路他人連不到
    environment:
      DATABASE_DRIVER: ${DATABASE_DRIVER:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////app/data/erp.db}
      DATABASE_URL_PROD: ${DATABASE_URL_PROD:-postgresql+asyncpg://erp:erp@postgres:5432/erp}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-use-openssl-rand-hex-32}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOW_DEMO_BYPASS: ${ALLOW_DEMO_BYPASS:-true}
      # CORS：同時允許 localhost 和 127.0.0.1 兩種訪問
      # （Windows 上 localhost 可能解析到 IPv6 ::1，瀏覽器可能直接用 127.0.0.1）
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173","http://localhost:3000","http://127.0.0.1:3000","http://localhost:8080","http://127.0.0.1:8080"]'
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped  # v3.39 K8：Docker 開機後自動拉起 Ouvoca
    # Uncomment when DATABASE_DRIVER=postgresql:
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  # ─── Factory nodes (MESH) ─────────────────────────────────────────────
  factory-a:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ouvoca-factory-a
    command: ["python", "factory_node.py"]
    ports: ["127.0.0.1:8001:8001"]
    environment:
      FACTORY_ID: factory-a
      FACTORY_NAME: Factory A
      PORT: 8001
      HQ_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped  # v3.39 K8

  factory-b:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ouvoca-factory-b
    command: ["python", "factory_node.py"]
    ports: ["127.0.0.1:8002:8002"]
    environment:
      FACTORY_ID: factory-b
      FACTORY_NAME: Factory B
      PORT: 8002
      HQ_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped  # v3.39 K8

  # ─── Desktop frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-desktop
      dockerfile: Dockerfile
    container_name: ouvoca-frontend
    ports: ["127.0.0.1:5173:80"]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ─── War-room dashboard ───────────────────────────────────────────────
  war-room:
    build:
      context: ./war-room
      dockerfile: Dockerfile
    container_name: ouvoca-warroom
    ports: ["127.0.0.1:8080:80"]
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped  # v3.39 K8

  # ─── Optional: PostgreSQL (uncomment for prod-style local dev) ───────
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: ouvoca-postgres
  #   environment:
  #     POSTGRES_USER: erp
  #     POSTGRES_PASSWORD: erp
  #     POSTGRES_DB: erp
  #   ports: ["5432:5432"]
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U erp"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  backend-data:
  # pg-data:
