# nginx 設定 — 前端 SPA + 後端 API 反向代理
# 重點：SSE 必須 disable buffering，否則事件不會即時抵達瀏覽器

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 安全頭（Production 建議）
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;

    # 靜態資源 cache 1 年（filename 含 hash 自動 bust）
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|svg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Single-Page App routing — 所有路徑都 fallback index.html
    location / {
        try_files $uri $uri/ /index.html;
        # index.html 本身不要 cache（這樣前端更新會立刻拿到新版）
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # === SSE 專用 location（必須放在 /api/ 之前以優先匹配）===
    location = /api/events/stream {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ★★★ SSE 強制設定：絕對不能 buffer ★★★
        proxy_buffering          off;
        proxy_cache              off;
        chunked_transfer_encoding off;
        # 24 小時長連線
        proxy_read_timeout       86400s;
        proxy_send_timeout       86400s;
        # 通知下游關閉 buffering（nginx 額外保險）
        proxy_set_header X-Accel-Buffering "no";
    }

    # 一般 API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 一般 API 適度 timeout（給 LLM 留 60 秒空間）
        proxy_connect_timeout    10s;
        proxy_send_timeout       90s;
        proxy_read_timeout       90s;
        client_max_body_size     20m;  # 給檔案上傳（拍照存證）
    }

    # Docker / K8s healthcheck
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
