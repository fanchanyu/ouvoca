<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">
  <defs>
    <!-- 漸層 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="meshGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>

    <!-- 陰影 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 箭頭 -->
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1400" height="1000" fill="url(#bgGrad)"/>

  <!-- 標題 -->
  <text x="700" y="50" font-size="32" font-weight="700" fill="#fff" text-anchor="middle">
    LLM-ERP 系統架構拓樸圖
  </text>
  <text x="700" y="78" font-size="14" fill="#94a3b8" text-anchor="middle">
    AI-Native Enterprise Resource Planning · Multi-Agent · MESH 多廠協同
  </text>

  <!-- ============================================================
       Layer 1: Client Tier (上方)
       ============================================================ -->
  <text x="700" y="120" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="3">CLIENT TIER · 客戶端</text>

  <!-- LINE Bot -->
  <g filter="url(#softShadow)">
    <rect x="120" y="140" width="200" height="100" rx="14" fill="url(#clientGrad)"/>
    <text x="220" y="178" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">📱 LINE Bot</text>
    <text x="220" y="202" font-size="11" fill="#cffafe" text-anchor="middle">王董 · 老吳（外協廠）</text>
    <text x="220" y="222" font-size="10" fill="#a5f3fc" text-anchor="middle">老闆儀表板 / 外協回報 / 推播</text>
  </g>

  <!-- Mobile App -->
  <g filter="url(#softShadow)">
    <rect x="370" y="140" width="200" height="100" rx="14" fill="url(#clientGrad)"/>
    <text x="470" y="178" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">📲 Mobile App</text>
    <text x="470" y="202" font-size="11" fill="#cffafe" text-anchor="middle">小陳 · 林廠長 · 阿玲</text>
    <text x="470" y="222" font-size="10" fill="#a5f3fc" text-anchor="middle">Expo + RN · 掃 QR · 推播</text>
  </g>

  <!-- Desktop UI -->
  <g filter="url(#softShadow)">
    <rect x="620" y="140" width="200" height="100" rx="14" fill="url(#clientGrad)"/>
    <text x="720" y="178" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">🖥️ Desktop UI</text>
    <text x="720" y="202" font-size="11" fill="#cffafe" text-anchor="middle">React + Vite + Tailwind</text>
    <text x="720" y="222" font-size="10" fill="#a5f3fc" text-anchor="middle">10 頁面 · 中英雙語</text>
  </g>

  <!-- War-Room -->
  <g filter="url(#softShadow)">
    <rect x="870" y="140" width="200" height="100" rx="14" fill="url(#clientGrad)"/>
    <text x="970" y="178" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">📡 War-Room</text>
    <text x="970" y="202" font-size="11" fill="#cffafe" text-anchor="middle">HTML + SSE 即時看板</text>
    <text x="970" y="222" font-size="10" fill="#a5f3fc" text-anchor="middle">中央指揮台</text>
  </g>

  <!-- 客戶 Portal -->
  <g filter="url(#softShadow)">
    <rect x="1120" y="140" width="160" height="100" rx="14" fill="url(#clientGrad)" opacity="0.6"/>
    <text x="1200" y="178" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">🌐 Client Portal</text>
    <text x="1200" y="202" font-size="10" fill="#cffafe" text-anchor="middle">未來規劃</text>
    <text x="1200" y="222" font-size="10" fill="#a5f3fc" text-anchor="middle">客戶自助查詢</text>
  </g>

  <!-- ============================================================
       Layer 2: API Gateway
       ============================================================ -->
  <text x="700" y="290" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="3">API GATEWAY · 中介層</text>

  <g filter="url(#softShadow)">
    <rect x="200" y="310" width="1000" height="70" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="700" y="340" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">
      🔐 Auth Middleware  →  📋 Audit Middleware  →  ⚠️ Exception Handler
    </text>
    <text x="700" y="362" font-size="11" fill="#94a3b8" text-anchor="middle">
      JWT 驗證 · RBAC 權限檢查 · Row-Level Filter · 變更稽核 · 統一錯誤回應
    </text>
  </g>

  <!-- ============================================================
       Layer 3: Application Core (中間，最重要)
       ============================================================ -->
  <text x="700" y="430" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="3">APPLICATION CORE · 應用核心</text>

  <!-- FastAPI Backend 大容器 -->
  <g filter="url(#softShadow)">
    <rect x="80" y="450" width="1240" height="280" rx="20" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text x="700" y="478" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">FastAPI Backend · 102 個 REST API + SSE</text>

    <!-- 12 Domain APIs -->
    <g filter="url(#softShadow)">
      <rect x="110" y="500" width="380" height="200" rx="12" fill="url(#brandGrad)"/>
      <text x="300" y="528" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">🏢 12 Domain APIs</text>
      <text x="125" y="554" font-size="11" fill="#dbeafe">📦 Inventory · 🛒 Purchase · 🏭 Production</text>
      <text x="125" y="574" font-size="11" fill="#dbeafe">💰 Sales · 🔬 Quality · 💳 Accounting</text>
      <text x="125" y="594" font-size="11" fill="#dbeafe">📍 Warehouse · 👥 CRM · 📊 MPS/MRP</text>
      <text x="125" y="614" font-size="11" fill="#dbeafe">🏛️ Organization · 🔗 Outsource · 🌐 MESH</text>
      <text x="125" y="640" font-size="10" fill="#bfdbfe">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
      <text x="125" y="660" font-size="11" fill="#eff6ff">66 個資料表 · 109 個權限碼</text>
      <text x="125" y="680" font-size="11" fill="#eff6ff">19 個業務表帶 tenant_id（MESH 準備就緒）</text>
    </g>

    <!-- Multi-Agent Engine -->
    <g filter="url(#softShadow)">
      <rect x="510" y="500" width="380" height="200" rx="12" fill="url(#aiGrad)"/>
      <text x="700" y="528" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">🤖 Multi-Agent Engine</text>
      <text x="525" y="554" font-size="11" fill="#ede9fe">IntentClassifier · 加權關鍵字</text>
      <text x="525" y="574" font-size="11" fill="#ede9fe">10 個 Domain Agent · 26+ Tools</text>
      <text x="525" y="594" font-size="11" fill="#ede9fe">Tool Calling Loop（≤5 rounds）</text>
      <text x="525" y="618" font-size="10" fill="#c4b5fd">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
      <text x="525" y="640" font-size="11" fill="#f3f4f6">LLM Provider 抽象層：</text>
      <text x="525" y="660" font-size="10" fill="#ddd6fe">  Anthropic · OpenAI · DeepSeek · Ollama</text>
      <text x="525" y="680" font-size="11" fill="#f3f4f6">DecisionLog · AfterActionReview</text>
    </g>

    <!-- Event Engine -->
    <g filter="url(#softShadow)">
      <rect x="910" y="500" width="380" height="200" rx="12" fill="url(#dataGrad)"/>
      <text x="1100" y="528" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">⚡ Event Engine</text>
      <text x="925" y="554" font-size="11" fill="#d1fae5">EventBus · DomainEvent</text>
      <text x="925" y="574" font-size="11" fill="#d1fae5">16+ ConstraintChecker rules</text>
      <text x="925" y="594" font-size="11" fill="#d1fae5">NotificationDispatcher · 角色路由</text>
      <text x="925" y="618" font-size="10" fill="#a7f3d0">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
      <text x="925" y="640" font-size="11" fill="#f0fdf4">即時推送：</text>
      <text x="925" y="660" font-size="11" fill="#d1fae5">  SSE Stream · LINE Push</text>
      <text x="925" y="680" font-size="11" fill="#d1fae5">  FCM / APNs · WebSocket</text>
    </g>
  </g>

  <!-- ============================================================
       Layer 4: Data Layer
       ============================================================ -->
  <text x="700" y="780" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="3">DATA LAYER · 資料層</text>

  <g filter="url(#softShadow)">
    <rect x="80" y="800" width="600" height="110" rx="14" fill="#1e3a5f"/>
    <text x="380" y="828" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">🗄️ SQLAlchemy Async ORM</text>
    <text x="100" y="852" font-size="11" fill="#bfdbfe">• 66 個 tables（業務 58 + RBAC 8）</text>
    <text x="100" y="872" font-size="11" fill="#bfdbfe">• 19 個業務表帶 tenant_id（多廠隔離）</text>
    <text x="100" y="892" font-size="11" fill="#bfdbfe">• Alembic Async migration · 雙軌：SQLite (dev) / PostgreSQL (prod)</text>
  </g>

  <!-- RBAC -->
  <g filter="url(#softShadow)">
    <rect x="700" y="800" width="600" height="110" rx="14" fill="#7c2d12"/>
    <text x="1000" y="828" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">🛡️ RBAC 權限系統（架構級）</text>
    <text x="720" y="852" font-size="11" fill="#fed7aa">• 5 層模型：Tenant → User → Role → Permission → Row-Level Scope</text>
    <text x="720" y="872" font-size="11" fill="#fed7aa">• 109 個權限碼 · 11 個預設角色 · 6 種 row scope</text>
    <text x="720" y="892" font-size="11" fill="#fed7aa">• 87 個 endpoint 全套 require_permission 保護</text>
  </g>

  <!-- ============================================================
       Layer 5: MESH 多廠（最下方）
       ============================================================ -->
  <text x="700" y="940" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="3">MESH MULTI-FACTORY · VMI 友善 · 資料不外流</text>

  <!-- Factory nodes -->
  <g filter="url(#softShadow)">
    <rect x="120" y="960" width="220" height="30" rx="8" fill="url(#meshGrad)"/>
    <text x="230" y="982" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">🏭 主廠 :8001</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="380" y="960" width="220" height="30" rx="8" fill="url(#meshGrad)"/>
    <text x="490" y="982" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">🔧 鍍鋅外協 :8002</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="640" y="960" width="220" height="30" rx="8" fill="url(#meshGrad)"/>
    <text x="750" y="982" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">🔬 檢驗外協 :8003</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="900" y="960" width="220" height="30" rx="8" fill="url(#meshGrad)"/>
    <text x="1010" y="982" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">⚙️ N 個工廠節點…</text>
  </g>

  <!-- ============================================================
       連線：客戶 → API Gateway
       ============================================================ -->
  <g stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" opacity="0.6">
    <path d="M 220 240 L 220 310" stroke-dasharray="0"/>
    <path d="M 470 240 L 470 310" stroke-dasharray="0"/>
    <path d="M 720 240 L 720 310" stroke-dasharray="0"/>
    <path d="M 970 240 L 970 310" stroke-dasharray="0"/>
    <path d="M 1200 240 L 1200 310" stroke-dasharray="0" opacity="0.3"/>
  </g>

  <!-- API Gateway → Application Core -->
  <g stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrowOrange)" opacity="0.6">
    <path d="M 700 380 L 700 450"/>
  </g>

  <!-- Application Core 三大區塊互聯 -->
  <g stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="4,3">
    <path d="M 490 600 L 510 600" marker-end="url(#arrowBlue)"/>
    <path d="M 890 600 L 910 600" marker-end="url(#arrowGreen)"/>
  </g>

  <!-- Application Core → Data Layer -->
  <g stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" opacity="0.6">
    <path d="M 380 730 L 380 800"/>
    <path d="M 1000 730 L 1000 800"/>
  </g>

  <!-- Data Layer → MESH (虛線，表示部分廠別) -->
  <g stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowOrange)" opacity="0.5" stroke-dasharray="6,4">
    <path d="M 380 910 Q 380 935, 230 960"/>
    <path d="M 400 910 Q 400 935, 490 960"/>
    <path d="M 1000 910 Q 1000 935, 750 960"/>
    <path d="M 1100 910 Q 1100 935, 1010 960"/>
  </g>

  <!-- 圖例 -->
  <g transform="translate(80, 880)">
    <rect x="-10" y="-10" width="280" height="38" rx="6" fill="#0f172a" opacity="0.5"/>
    <text x="0" y="5" font-size="10" fill="#94a3b8" font-weight="600">圖例 LEGEND:</text>
    <line x1="0" y1="15" x2="20" y2="15" stroke="#3b82f6" stroke-width="2"/>
    <text x="25" y="18" font-size="10" fill="#94a3b8">HTTPS</text>
    <line x1="70" y1="15" x2="90" y2="15" stroke="#10b981" stroke-width="2"/>
    <text x="95" y="18" font-size="10" fill="#94a3b8">SQL</text>
    <line x1="130" y1="15" x2="150" y2="15" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="155" y="18" font-size="10" fill="#94a3b8">VPN/SSL</text>
    <line x1="210" y1="15" x2="230" y2="15" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="235" y="18" font-size="10" fill="#94a3b8">內部</text>
  </g>
</svg>
